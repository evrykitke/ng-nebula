<app-page-header
  [title]="(app()?.label ?? 'Module') + ' dashboard'"
  [subtitle]="'An overview of ' + (app()?.label ?? 'the module')"
  [breadcrumbs]="[{ label: app()?.label ?? 'Module' }, { label: 'Dashboard' }]"
>
  <button
    actions
    type="button"
    uiBtn
    variant="secondary"
    size="sm"
    [disabled]="!canvas.canCustomize()"
    (click)="canvas.openCustomize()"
  >
    <ng-icon name="lucideSettings2" size="15" />
    Customize
  </button>
</app-page-header>

<app-dashboard-canvas #canvas [dashboard]="canvasName()" />
