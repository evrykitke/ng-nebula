<app-page-header
  title="Reports"
  subtitle="Generate and view your workspace documents"
  [breadcrumbs]="[{ label: 'Workspace' }, { label: 'Reports' }]"
/>

@if (loading()) {
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    @for (i of [1, 2, 3]; track i) {
      <div class="h-28 animate-pulse rounded-xl border border-border bg-card"></div>
    }
  </div>
} @else if (items().length === 0) {
  <div
    class="flex flex-col items-center justify-center rounded-xl border border-dashed border-border
           py-16 text-center text-muted-foreground"
  >
    <ng-icon name="lucideFileChartColumn" size="40" />
    <p class="mt-3 text-sm">No reports are available yet.</p>
  </div>
} @else {
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    @for (report of items(); track report.name) {
      <a
        [routerLink]="['/workspace/reports', report.name]"
        class="group flex flex-col rounded-xl border border-border bg-card p-5 transition
               hover:border-primary/50 hover:shadow-sm"
      >
        <div class="flex items-start justify-between">
          <div
            class="flex size-10 items-center justify-center rounded-lg bg-primary/10 text-primary"
          >
            <ng-icon name="lucideFileText" size="20" />
          </div>
          <ng-icon
            name="lucideChevronRight"
            size="18"
            class="text-muted-foreground transition group-hover:translate-x-0.5 group-hover:text-foreground"
          />
        </div>
        <h2 class="mt-4 text-sm font-semibold text-foreground">{{ report.title }}</h2>
        <div class="mt-3 flex flex-wrap gap-1.5">
          @for (out of report.outputs; track out) {
            <span
              class="rounded-md border border-border px-1.5 py-0.5 text-[11px] font-medium
                     uppercase tracking-wide text-muted-foreground"
            >
              {{ out }}
            </span>
          }
        </div>
      </a>
    }
  </div>
}
