<app-page-header
  title="Dashboard"
  subtitle="An overview of your workspace"
  [breadcrumbs]="[{ label: 'Dashboard' }]"
>
  <button
    actions
    type="button"
    uiBtn
    variant="secondary"
    size="sm"
    [disabled]="!canvas.canCustomize()"
    (click)="canvas.openCustomize()"
  >
    <ng-icon name="lucideSettings2" size="15" />
    Customize
  </button>
</app-page-header>

<app-dashboard-canvas #canvas dashboard="workspace" />
