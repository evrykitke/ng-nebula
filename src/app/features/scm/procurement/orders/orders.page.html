<app-page-header
  title="Purchase orders"
  subtitle="Commitments to buy from suppliers — received against and billed"
  [breadcrumbs]="[{ label: 'Procurement' }, { label: 'Purchase orders' }]"
>
  @if (canCreate()) {
    <button uiBtn actions (click)="newOrder()">
      <ng-icon name="lucidePlus" size="16" /> New order
    </button>
  }
</app-page-header>

<app-data-table [config]="tableConfig()" [dataSource]="dataSource" (action)="onAction($event)">
  <div toolbar class="flex items-end gap-3">
    <div>
      <label class="mb-1 block text-xs font-medium text-muted-foreground">Status</label>
      <select [(ngModel)]="statusFilter" name="statusFilter" (ngModelChange)="applyFilters()">
        <option value="">All</option>
        <option value="draft">Draft</option>
        <option value="submitted">Submitted</option>
        <option value="approved">Approved</option>
        <option value="partially_received">Partially received</option>
        <option value="received">Received</option>
        <option value="closed">Closed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div>
      <label class="mb-1 block text-xs font-medium text-muted-foreground">Supplier</label>
      <select [(ngModel)]="supplierFilter" name="supplierFilter" (ngModelChange)="applyFilters()">
        <option value="">All suppliers</option>
        @for (s of suppliers(); track s.id) {
          <option [value]="s.id">{{ s.code }} — {{ s.name }}</option>
        }
      </select>
    </div>
  </div>
</app-data-table>
