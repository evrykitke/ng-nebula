<app-page-header
  [title]="title()"
  subtitle="An internal request to purchase items"
  [breadcrumbs]="[
    { label: 'Procurement' },
    { label: 'Requisitions', route: '/procurement/requisitions' },
    { label: editId() ? 'Edit' : 'New' },
  ]"
/>

<a
  routerLink="/procurement/requisitions"
  class="mb-4 inline-block text-sm text-muted-foreground hover:text-foreground"
>
  ← Back to requisitions
</a>

<form (ngSubmit)="saveDraft()" class="space-y-4">
  <div class="rounded-lg border border-border bg-card p-4">
    <div class="grid gap-3 md:grid-cols-3">
      <div>
        <label class="mb-1.5 block text-sm font-medium">Warehouse</label>
        <app-lookup
          [config]="warehouseLookup"
          [value]="form.warehouse_id"
          [display]="form.warehouse_label"
          (valueChange)="form.warehouse_id = $event ?? ''"
          (selected)="form.warehouse_label = $event.code + ' — ' + $event.name"
        />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium">Needed by</label>
        <app-datepicker [(date)]="form.needed_by" placeholder="Optional" />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium">Memo</label>
        <input
          [(ngModel)]="form.memo"
          name="memo"
          placeholder="Optional"
          class="h-9 w-full rounded-md border border-input bg-background px-3 text-sm"
        />
      </div>
    </div>
  </div>

  <div class="rounded-lg border border-border bg-card p-4">
    <h2 class="mb-3 text-sm font-semibold">Lines</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-border text-left text-xs text-muted-foreground">
            <th class="px-2 py-2 font-medium" style="min-width: 260px">Item</th>
            <th class="px-2 py-2 text-right font-medium" style="width: 120px">Qty</th>
            <th class="px-2 py-2 font-medium">Memo</th>
            <th class="px-2 py-2"></th>
          </tr>
        </thead>
        <tbody>
          @for (l of lines(); track $index) {
            <tr class="border-b border-border/50 align-top last:border-0">
              <td class="px-2 py-2">
                <app-lookup
                  [config]="itemLookup"
                  [value]="l.item_id"
                  [display]="l.item_label"
                  (valueChange)="onItemValue(l, $event)"
                  (selected)="onItemSelected(l, $event)"
                />
              </td>
              <td class="px-2 py-2">
                <input
                  type="number"
                  min="0"
                  step="0.001"
                  [(ngModel)]="l.qty"
                  [name]="'qty_' + $index"
                  class="h-9 w-full rounded-md border border-input bg-background px-2 text-right text-sm"
                />
              </td>
              <td class="px-2 py-2">
                <input
                  [(ngModel)]="l.memo"
                  [name]="'memo_' + $index"
                  placeholder="Optional"
                  class="h-9 w-full rounded-md border border-input bg-background px-2 text-sm"
                />
              </td>
              <td class="px-2 py-2 text-right">
                @if (lines().length > 1) {
                  <button
                    type="button"
                    class="rounded-md p-1.5 text-muted-foreground hover:bg-accent hover:text-destructive"
                    (click)="removeLine($index)"
                    aria-label="Remove line"
                  >
                    <ng-icon name="lucideTrash2" size="16" />
                  </button>
                }
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <button uiBtn type="button" variant="outline" size="sm" class="mt-3" (click)="addLine()">
      <ng-icon name="lucidePlus" size="14" /> Add line
    </button>
  </div>

  @if (formError()) {
    <p class="text-sm text-destructive">{{ formError() }}</p>
  }

  <div class="flex items-center gap-3">
    <button uiBtn type="submit" variant="outline" [disabled]="saving()">
      {{ saving() ? 'Saving…' : 'Save draft' }}
    </button>
    @if (canSubmit()) {
      <button uiBtn type="button" [disabled]="saving()" (click)="saveSubmit()">
        {{ saving() ? 'Working…' : 'Save & submit' }}
      </button>
    }
    <a uiBtn variant="ghost" routerLink="/procurement/requisitions">Cancel</a>
  </div>
</form>
