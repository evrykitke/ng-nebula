<app-page-header
  title="POS settings"
  subtitle="How the tills count, tenant-wide"
  [breadcrumbs]="[{ label: 'Point of Sale' }, { label: 'Settings' }]"
>
  <button uiBtn actions [disabled]="busy() || loading()" (click)="save()">Save</button>
</app-page-header>

@if (loading()) {
  <app-page-skeleton />
} @else {
  <div class="max-w-2xl space-y-4">
    <div class="rounded-lg border border-border bg-card p-5">
      <label class="flex items-start gap-3">
        <input type="checkbox" [(ngModel)]="blindCount" class="mt-1" />
        <span>
          <span class="block text-sm font-medium">Blind cash count</span>
          <span class="mt-0.5 block text-sm text-muted-foreground">
            Cashiers count the drawer without being shown what it should hold — the X report
            withholds the cash expectation. M-Pesa and card totals stay visible (those come from
            records, not a count), supervisors with the POS reports permission always see
            everything, and the server checks the count either way.
          </span>
        </span>
      </label>
    </div>

    <div class="rounded-lg border border-border bg-card p-5">
      <h2 class="text-sm font-medium">Denominations</h2>
      <p class="mt-0.5 text-sm text-muted-foreground">
        The notes and coins the count sheet offers at close. Empty = no count-sheet helper.
      </p>

      <div class="mt-3 flex flex-wrap gap-2">
        @for (d of denominations; track d) {
          <span
            class="inline-flex items-center gap-1.5 rounded-full border border-border bg-background px-3 py-1 text-sm tabular-nums"
          >
            {{ fmtMoney(d) }}
            <button
              type="button"
              class="text-muted-foreground hover:text-destructive"
              [attr.aria-label]="'Remove ' + d"
              (click)="removeDenomination(d)"
            >
              <ng-icon name="lucideX" size="13" />
            </button>
          </span>
        } @empty {
          <p class="text-sm text-muted-foreground">No denominations — counts are typed as one amount.</p>
        }
      </div>

      <form class="mt-4 flex items-center gap-2" (ngSubmit)="addDenomination()">
        <input
          type="number"
          min="0"
          step="0.01"
          [(ngModel)]="newDenomination"
          name="denomination"
          placeholder="e.g. 1000"
          class="h-9 w-36 rounded-md border border-input bg-background px-3 text-right text-sm"
        />
        <button uiBtn type="submit" variant="outline" size="sm">
          <ng-icon name="lucidePlus" size="15" /> Add
        </button>
      </form>
    </div>
  </div>
}
